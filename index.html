<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
</head>
<body>
    <div class="calculator">
        <p class="edition">HORIZON ARCANE SPECIAL EDITION </p>
        <input class="display" id="num-display" type="text" placeholder="                                         0" readonly><br>
        <div class="columns">
       <div class="column1"> 
        <button class="button">&#8730;</button>
        <button class="button">%</button>
        <button class="button">&#8657;</button>
        <button class="button">&#8659;</button>
        </div>
       <div class="column2"> 
        <button class="button">GST+</button>
        <button class="button">GST-</button>
        <button class="button">RATE</button>
        <button class="button">&#9654;</button>
      
        </div>
       <div class="column3"> 
        <button class="button">+/-</button>
        <button class="button number">1</button>
        <button class="button number">4</button>
        <button class="button number">7</button>
        <button class="button  number"> 0 </button>
     
        </div>
       <div class="column4"> 
        <button class="button">CE</button>
        <button class="button number">2</button>
        <button class="button number">5</button>
        <button class="button number">8</button>
        <button class="button  number">00</button>
        
        </div>
       <div class="column5"> 
             
             <button class="button  number">3</button>
             <button class="button number ">6</button>
             <button class="button number">9</button>  
             <button class="button "> = </button>
        </div>
            <div class="column6">
             
             <button class="button switchon"> ON/AC</button>
             <button class="button operation">.</button>
             <button class="button operation">÷</button>            
             <button class="button operation">×</button>
             <button class="button operation">-</button>
             <button class="button  addition">+</button>
            
             </div>
      </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
